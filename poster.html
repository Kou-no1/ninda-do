<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ゆびの おやくそく | 忍打道 —NINDA DO—</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 12mm;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #fff;
      color: #2A2622;
      font-family: "Noto Sans JP", "Hiragino Sans", "BIZ UDPGothic", "Yu Gothic UI", system-ui, sans-serif;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .poster-sheet {
      width: min(100%, 273mm);
      min-height: 186mm;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 9mm;
      border: 5px double #2A2622;
      padding: 9mm 10mm 8mm;
      background: #fff;
    }
    .poster-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }
    .poster-crest {
      width: 28px;
      height: 28px;
      color: #2A2622;
      flex: 0 0 auto;
    }
    .poster-header h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
      line-height: 1.1;
    }
    .poster-main {
      display: grid;
      gap: 7mm;
      align-content: center;
    }
    .poster-keyboard {
      display: grid;
      gap: 7px;
      justify-content: center;
    }
    .poster-key-row {
      display: flex;
      justify-content: center;
      gap: 7px;
    }
    .poster-key {
      position: relative;
      width: 58px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 3px solid #2A2622;
      border-radius: 8px;
      background: var(--finger-color);
      color: #2A2622;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .home-bump {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: #2A2622;
    }
    .poster-hands {
      display: grid;
      justify-items: center;
    }
    .poster-hands svg {
      width: min(620px, 100%);
      height: auto;
    }
    .poster-legend {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 14px;
      width: min(860px, 100%);
      margin: 0 auto;
      font-size: 15px;
      font-weight: 800;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .legend-swatch {
      width: 22px;
      height: 22px;
      border: 2px solid #2A2622;
      border-radius: 50%;
      background: var(--finger-color);
      flex: 0 0 auto;
    }
    .poster-note {
      margin: 0;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
    }
    .crest-svg { width: 100%; height: 100%; display: block; }
    .crest-ring, .crest-line {
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .crest-ring { stroke-width: 4; }
    .crest-line { stroke-width: 6; }
    .crest-line.thin { stroke-width: 4; }
    .crest-dot { fill: currentColor; stroke: none; }
    @media print {
      body {
        display: block;
        padding: 0;
      }
      .poster-sheet {
        width: 267mm;
        height: 180mm;
        min-height: 0;
        border-width: 4px;
        padding: 6mm 8mm;
        gap: 4mm;
        box-shadow: none;
      }
      .poster-main { gap: 4mm; }
      .poster-header h1 { font-size: 29px; }
      .poster-keyboard { gap: 5px; }
      .poster-key-row { gap: 5px; }
      .poster-key {
        width: 51px;
        height: 40px;
        font-size: 20px;
        border-width: 2.5px;
      }
      .poster-hands svg { width: 520px; }
      .poster-legend {
        gap: 5px 10px;
        font-size: 12.5px;
      }
      .legend-swatch {
        width: 18px;
        height: 18px;
      }
      .poster-note { font-size: 19px; }
    }
  </style>
</head>
<body>
  <main class="poster-sheet">
    <header class="poster-header">
      <div id="posterLogoCrest" class="poster-crest"></div>
      <h1>ゆびの おやくそく</h1>
    </header>
    <div id="posterGuide" class="poster-main"></div>
  </main>
  <script src="data/finger-data.js"></script>
  <script src="js/svg-icons.js"></script>
  <script src="js/guide-renderer.js"></script>
  <script>
    (function () {
      function initPoster() {
        document.getElementById("posterLogoCrest").innerHTML = SVG_ICONS.crest("kamae");
        GuideRenderer.renderPoster(document.getElementById("posterGuide"));
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", initPoster);
      else initPoster();
    })();
  </script>
</body>
</html>
